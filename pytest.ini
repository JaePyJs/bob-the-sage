[pytest]
# Pytest configuration for SAGE project

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = backend/tests

# Output options
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    --showlocals
    # Show summary of all test outcomes
    -ra
    # Enable strict markers (fail on unknown markers)
    --strict-markers
    # Coverage options
    --cov=backend
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    # Fail if coverage is below threshold
    --cov-fail-under=80
    # Show warnings
    -W default
    # Asyncio mode
    --asyncio-mode=auto

# Markers for categorizing tests
markers =
    asyncio: mark test as async (requires pytest-asyncio)
    slow: mark test as slow running (> 1 second)
    integration: mark test as integration test (requires external services)
    unit: mark test as unit test (fast, isolated)
    smoke: mark test as smoke test (basic functionality check)

# Coverage configuration
[coverage:run]
source = backend
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */env/*
    */.venv/*

[coverage:report]
# Fail if coverage is below 80%
fail_under = 80
# Show missing lines
show_missing = True
# Skip covered files
skip_covered = False
# Precision for coverage percentage
precision = 2
# Exclude lines from coverage
exclude_lines =
    # Standard pragma
    pragma: no cover
    # Don't complain about missing debug code
    def __repr__
    # Don't complain if tests don't hit defensive assertion code
    raise AssertionError
    raise NotImplementedError
    # Don't complain if non-runnable code isn't run
    if __name__ == .__main__.:
    # Don't complain about abstract methods
    @abstractmethod
    # Don't complain about type checking blocks
    if TYPE_CHECKING:
    # Don't complain about protocol methods
    \.\.\.

[coverage:html]
directory = htmlcov

